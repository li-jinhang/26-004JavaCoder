server:
  port: 26904

spring:
  application:
    name: javacoder-backend

judge:
  sandbox:
    mode: docker
    docker-executable: docker
    java-image: javacoder-java17-sandbox:latest
    compile-timeout: 8s
    run-timeout: 3s
    max-source-bytes: 65536
    max-output-bytes: 65536
    memory-mb: 256
    cpus: "1.0"
    pids-limit: 64
    tmpfs-mb: 64
    network-enabled: false

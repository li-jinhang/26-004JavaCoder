server:
  port: 26904

spring:
  application:
    name: javacoder-backend
  config:
    import:
      - optional:file:./backend/config/llm.yml
      - optional:file:./config/llm.yml

javacoder:
  storage:
    sqlite-path: ${JAVACODER_SQLITE_PATH:./data/javacoder.sqlite}

judge:
  sandbox:
    mode: docker
    docker-executable: docker
    java-image: javacoder-java17-sandbox:latest
    python-image: javacoder-python3-sandbox:latest
    python-executable: python3
    compile-timeout: 8s
    run-timeout: 3s
    max-source-bytes: 65536
    max-output-bytes: 65536
    memory-mb: 256
    cpus: "1.0"
    pids-limit: 64
    tmpfs-mb: 64
    network-enabled: false

llm:
  enabled: ${JAVACODER_LLM_ENABLED:false}
  base-url: ${JAVACODER_LLM_BASE_URL:}
  api-key: ${JAVACODER_LLM_API_KEY:}
  model: ${JAVACODER_LLM_MODEL:}
  timeout: 30s
  max-input-chars: 60000
